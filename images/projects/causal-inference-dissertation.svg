<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2748"/>
      <stop offset="100%" stop-color="#243b67"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ecf4ff"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="80" y="80" width="1040" height="560" rx="24" fill="#ffffff" opacity="0.08"/>

  <text x="120" y="160" fill="#eef5ff" font-size="44" font-family="Arial, sans-serif" font-weight="700">
    Causal Inference DAG
  </text>
  <text x="120" y="200" fill="#c8d8f0" font-size="24" font-family="Arial, sans-serif">
    Smoking (A) and overweight/obesity risk (Y) with confounders (L)
  </text>

  <rect x="140" y="245" width="920" height="330" rx="20" fill="#0f1a33" opacity="0.55"/>

  <circle cx="320" cy="410" r="52" fill="#6fd3e5"/>
  <text x="303" y="422" fill="#12304a" font-size="36" font-family="Arial, sans-serif" font-weight="700">L</text>

  <circle cx="600" cy="410" r="60" fill="#ffbf00"/>
  <text x="577" y="424" fill="#4b3700" font-size="42" font-family="Arial, sans-serif" font-weight="700">A</text>

  <circle cx="880" cy="410" r="52" fill="#86d7df"/>
  <text x="860" y="422" fill="#133a40" font-size="36" font-family="Arial, sans-serif" font-weight="700">Y</text>

  <line x1="372" y1="410" x2="532" y2="410" stroke="#ecf4ff" stroke-width="7" marker-end="url(#arr)"/>
  <line x1="660" y1="410" x2="828" y2="410" stroke="#ecf4ff" stroke-width="7" marker-end="url(#arr)"/>
  <line x1="360" y1="378" x2="546" y2="352" stroke="#ecf4ff" stroke-width="5" marker-end="url(#arr)"/>

  <text x="230" y="525" fill="#d6e3f5" font-size="26" font-family="Arial, sans-serif">L: age, education, veteran status, children</text>
</svg>
