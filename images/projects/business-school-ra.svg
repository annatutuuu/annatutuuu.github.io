<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324a"/>
      <stop offset="100%" stop-color="#1f4b63"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dff3ff"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="70" y="90" width="1060" height="540" rx="26" fill="#ffffff" opacity="0.08"/>

  <text x="600" y="240" text-anchor="middle" fill="#eef8ff" font-size="52" font-family="Arial, sans-serif" font-weight="700">
    Fuzzy Record Linkage
  </text>
  <text x="600" y="285" text-anchor="middle" fill="#c9e3f2" font-size="28" font-family="Arial, sans-serif">
    LinkedIn + Inventor + Assignee Data
  </text>

  <g font-family="Arial, sans-serif" font-weight="700" font-size="26">
    <rect x="170" y="360" width="240" height="84" rx="14" fill="#8ecae6"/>
    <text x="290" y="412" text-anchor="middle" fill="#16364d">Input Data</text>

    <rect x="480" y="360" width="240" height="84" rx="14" fill="#72efdd"/>
    <text x="600" y="412" text-anchor="middle" fill="#11403b">Normalize Names</text>

    <rect x="790" y="360" width="240" height="84" rx="14" fill="#ffd166"/>
    <text x="910" y="412" text-anchor="middle" fill="#4e3b07">Match + Score</text>
  </g>

  <g stroke="#dff3ff" stroke-width="5" fill="none" marker-end="url(#arr)">
    <line x1="412" y1="402" x2="470" y2="402"/>
    <line x1="722" y1="402" x2="780" y2="402"/>
  </g>

  <text x="600" y="525" text-anchor="middle" fill="#d2e8f5" font-size="24" font-family="Arial, sans-serif">
    Python pipeline with configurable thresholds
  </text>
</svg>
